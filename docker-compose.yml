services:
  postgres:
    image: postgres:16
    container_name: ai-agent-template-postgres
    environment:
      POSTGRES_DB: chat_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
